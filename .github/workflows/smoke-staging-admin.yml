name: Smoke staging admin
run-name: Smoke staging admin

on:
  workflow_dispatch:
    inputs:
      public_base_url:
        description: Optional HTTPS staging URL. Defaults to STAGING_PUBLIC_BASE_URL.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: staging-admin-smoke
  cancel-in-progress: false

env:
  STAGING_PUBLIC_BASE_URL: ${{ vars.STAGING_PUBLIC_BASE_URL }}

jobs:
  smoke:
    name: Admin smoke
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify staging admin authorization
        shell: bash
        env:
          INPUT_PUBLIC_BASE_URL: ${{ inputs.public_base_url }}
          STAGING_ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          STAGING_ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          base_url="${INPUT_PUBLIC_BASE_URL:-${STAGING_PUBLIC_BASE_URL:-}}"
          ./scripts/verify-staging-admin-smoke.sh --base-url "$base_url"

          {
            echo "## Staging admin smoke"
            echo
            echo "- Base URL: \`${base_url%/}\`"
            echo "- Unauthenticated rejection: passed"
            echo "- Regular user rejection: passed"
            echo "- Admin moderation list: passed"
          } >> "$GITHUB_STEP_SUMMARY"
