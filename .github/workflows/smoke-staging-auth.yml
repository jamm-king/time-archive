name: Smoke staging auth
run-name: Smoke staging auth

on:
  workflow_dispatch:
    inputs:
      public_base_url:
        description: Optional HTTPS staging URL. Defaults to STAGING_PUBLIC_BASE_URL.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: staging-auth-smoke
  cancel-in-progress: false

env:
  STAGING_PUBLIC_BASE_URL: ${{ vars.STAGING_PUBLIC_BASE_URL }}

jobs:
  smoke:
    name: Auth smoke
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify staging auth
        shell: bash
        env:
          INPUT_PUBLIC_BASE_URL: ${{ inputs.public_base_url }}
        run: |
          set -euo pipefail

          base_url="${INPUT_PUBLIC_BASE_URL:-${STAGING_PUBLIC_BASE_URL:-}}"
          ./scripts/verify-staging-auth-smoke.sh --base-url "$base_url"

          {
            echo "## Staging auth smoke"
            echo
            echo "- Base URL: \`${base_url%/}\`"
            echo "- CSRF rejection: passed"
            echo "- Registration: passed"
            echo "- Session cookie attributes: passed"
            echo "- Logout and login: passed"
          } >> "$GITHUB_STEP_SUMMARY"
