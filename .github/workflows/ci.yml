name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Docker build
        run: docker build -t time-archive-api:${{ github.sha }} .

  local-purchase-flow:
    name: Local purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start local stack
        run: docker compose up -d --build

      - name: Verify local purchase flow
        env:
          START_SECOND: "1000"
          END_SECOND: "1010"
        run: ./scripts/verify-local-purchase-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down
