name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  COMPOSE_ENV_FILES: .env.local.example

jobs:
  cloudformation:
    name: CloudFormation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/cloudformation/requirements.txt

      - name: Install CloudFormation validator
        run: python -m pip install --requirement infra/cloudformation/requirements.txt

      - name: Verify staging CloudFormation
        run: ./scripts/verify-staging-cloudformation.sh

      - name: Verify staging provisioning preflight
        run: ./scripts/verify-staging-provisioning-preflight.sh

      - name: Verify staging image publication workflow
        run: ./scripts/verify-staging-image-publish-workflow.sh

      - name: Verify staging deployment workflow
        run: ./scripts/verify-staging-deploy-workflow.sh

      - name: Verify staging public smoke workflow
        run: ./scripts/verify-staging-public-smoke-workflow.sh

      - name: Verify staging request ID smoke workflow
        run: ./scripts/verify-staging-request-id-smoke-workflow.sh

      - name: Verify staging auth smoke workflow
        run: ./scripts/verify-staging-auth-smoke-workflow.sh

      - name: Verify staging security headers smoke workflow
        run: ./scripts/verify-staging-security-headers-workflow.sh

      - name: Verify staging admin role grant script
        run: ./scripts/verify-staging-admin-role-grant.sh

      - name: Verify staging admin smoke workflow
        run: ./scripts/verify-staging-admin-smoke-workflow.sh

      - name: Verify staging owned range grant script
        run: ./scripts/verify-staging-owned-range-grant.sh

      - name: Verify staging media preview smoke workflow
        run: ./scripts/verify-staging-media-preview-smoke-workflow.sh

      - name: Verify staging presigned upload CORS smoke workflow
        run: ./scripts/verify-staging-presigned-upload-cors-smoke-workflow.sh

      - name: Verify staging rollback drill
        run: ./scripts/verify-staging-rollback-drill.sh

      - name: Verify CloudWatch log operations
        run: ./scripts/verify-cloudwatch-log-operations.sh

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OpenAPI
        run: ./scripts/verify-openapi.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: apps/api
        run: ./gradlew build --no-daemon

      - name: Docker build
        run: docker build -f apps/api/Dockerfile.ci -t time-archive-api:${{ github.sha }} apps/api

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  production-deployment:
    name: Production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify production deployment policy
        run: ./scripts/verify-production-deployment.sh

      - name: Verify staging deployment runtime policy
        run: ./scripts/verify-staging-deployment-runtime.sh

      - name: Verify staging runtime parameter contract
        run: ./scripts/verify-staging-runtime-parameters.sh

      - name: Build API image for ARM64
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/arm64
          push: false
          cache-from: type=gha,scope=production-api-arm64
          cache-to: type=gha,mode=max,scope=production-api-arm64

      - name: Build Web image for ARM64
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          platforms: linux/arm64
          push: false
          cache-from: type=gha,scope=production-web-arm64
          cache-to: type=gha,mode=max,scope=production-web-arm64

  local-purchase-flow:
    name: Local purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build api

      - name: Verify local purchase flow
        env:
          START_SECOND: "1000"
          END_SECOND: "1010"
        run: ./scripts/verify-local-purchase-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-media-upload-flow:
    name: Local media upload flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build api

      - name: Verify local media upload flow
        env:
          START_SECOND: "2000"
          END_SECOND: "2001"
        run: ./scripts/verify-local-media-upload-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-public-timeline-flow:
    name: Local public timeline flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build api

      - name: Verify local public timeline flow
        env:
          START_SECOND: "3000"
          END_SECOND: "3001"
        run: ./scripts/verify-local-public-timeline-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-admin-preview-flow:
    name: Local admin preview flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build api

      - name: Verify local admin preview flow
        env:
          START_SECOND: "6000"
          END_SECOND: "6001"
        run: ./scripts/verify-local-admin-preview-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-auth-flows:
    name: Local auth flows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Verify local auth flow
        run: ./scripts/verify-local-auth-flow.sh

      - name: Verify local auth owned-ranges flow
        run: ./scripts/verify-local-auth-owned-ranges-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-web-purchase-upload-flows:
    name: Local web purchase upload flows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Verify local web purchase flow
        env:
          START_SECOND: "4000"
          END_SECOND: "4001"
        run: ./scripts/verify-local-web-purchase-flow.sh

      - name: Verify local web purchase-upload flow
        env:
          START_SECOND: "5000"
          END_SECOND: "5001"
        run: ./scripts/verify-local-web-purchase-upload-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-web-smoke:
    name: Local web smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Verify web app
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:3000 >/dev/null; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Web app did not become ready" >&2
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..60}; do
            if curl --fail --silent --show-error "http://localhost:3000/api/timeline?from=0&to=1"; then
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Timeline proxy did not become ready" >&2
              exit 1
            fi

            sleep 2
          done

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down
