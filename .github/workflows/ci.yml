name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  COMPOSE_ENV_FILES: .env.local.example

jobs:
  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OpenAPI
        run: ./scripts/verify-openapi.sh

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        working-directory: apps/api
        run: ./gradlew test --no-daemon

      - name: Build
        working-directory: apps/api
        run: ./gradlew build --no-daemon

      - name: Docker build
        run: docker build -f apps/api/Dockerfile.ci -t time-archive-api:${{ github.sha }} apps/api

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  local-purchase-flow:
    name: Local purchase flow
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build API jar
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Start local stack
        run: ./scripts/start-local-stack.sh -f docker-compose.yml -f docker-compose.ci.yml up -d --build api

      - name: Verify local purchase flow
        env:
          START_SECOND: "1000"
          END_SECOND: "1010"
        run: ./scripts/verify-local-purchase-flow.sh

      - name: Docker compose logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down

  local-media-upload-flow:
    name: Local media upload flow
    runs-on: ubuntu-latest
