name: Publish staging images
run-name: Publish staging images for ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: staging-image-publication
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_STAGING_IMAGE_PUBLISH_ROLE_ARN: ${{ vars.AWS_STAGING_IMAGE_PUBLISH_ROLE_ARN }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  API_REPOSITORY_NAME: time-archive-staging-api
  WEB_REPOSITORY_NAME: time-archive-staging-web

jobs:
  publish:
    name: Publish ARM64 images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout exact main commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate publication configuration
        shell: bash
        run: |
          set -euo pipefail

          [[ "$GITHUB_REF" == "refs/heads/main" ]] || {
            echo "Image publication is allowed only from main" >&2
            exit 1
          }
          [[ "$AWS_ACCOUNT_ID" =~ ^[0-9]{12}$ ]] || {
            echo "AWS_ACCOUNT_ID must be a 12-digit repository variable" >&2
            exit 1
          }
          [[ "$AWS_REGION" == "ap-northeast-2" ]] || {
            echo "AWS_REGION must match the staging CloudFormation region" >&2
            exit 1
          }
          [[ "$AWS_STAGING_IMAGE_PUBLISH_ROLE_ARN" =~ ^arn:aws:iam::${AWS_ACCOUNT_ID}:role/.+$ ]] || {
            echo "AWS_STAGING_IMAGE_PUBLISH_ROLE_ARN must belong to AWS_ACCOUNT_ID" >&2
            exit 1
          }
          [[ "$ECR_REGISTRY" == "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" ]] || {
            echo "ECR registry does not match the configured account and region" >&2
            exit 1
          }
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "GITHUB_SHA must be a full commit SHA" >&2
            exit 1
          }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@633526dcc9c26211a4282d6d8de3d8b5cb7ad07b # v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_STAGING_IMAGE_PUBLISH_ROLE_ARN }}
          role-session-name: time-archive-image-${{ github.run_id }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}
          mask-aws-account-id: true

      - name: Log in to private ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2
        with:
          mask-password: true

      - name: Verify ECR login registry
        shell: bash
        env:
          LOGIN_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail
          [[ "$LOGIN_REGISTRY" == "$ECR_REGISTRY" ]] || {
            echo "Authenticated ECR registry does not match ECR_REGISTRY" >&2
            exit 1
          }

      - name: Check immutable publication state
        id: publication-state
        shell: bash
        run: |
          set -euo pipefail

          image_exists() {
            aws ecr describe-images \
              --repository-name "$1" \
              --image-ids "imageTag=${GITHUB_SHA}" \
              >/dev/null 2>&1
          }

          api_exists=false
          web_exists=false
          image_exists "$API_REPOSITORY_NAME" && api_exists=true
          image_exists "$WEB_REPOSITORY_NAME" && web_exists=true

          if [[ "$api_exists" == "true" && "$web_exists" == "true" ]]; then
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "Both immutable image tags already exist; publication is a no-op"
          elif [[ "$api_exists" == "false" && "$web_exists" == "false" ]]; then
            echo "publish_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "Partial image publication exists for ${GITHUB_SHA}; operator review is required" >&2
            exit 1
          fi

      - name: Build and push API ARM64 image
        if: steps.publication-state.outputs.publish_required == 'true'
        id: build-api
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/arm64
          pull: true
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.API_REPOSITORY_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=staging-api-arm64
          cache-to: type=gha,mode=max,scope=staging-api-arm64

      - name: Build and push Web ARM64 image
        if: steps.publication-state.outputs.publish_required == 'true'
        id: build-web
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: apps/web
          file: apps/web/Dockerfile
          platforms: linux/arm64
          pull: true
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.WEB_REPOSITORY_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=staging-web-arm64
          cache-to: type=gha,mode=max,scope=staging-web-arm64

      - name: Verify published image digests
        id: verify-images
        shell: bash
        env:
          BUILDX_API_DIGEST: ${{ steps.build-api.outputs.digest }}
          BUILDX_WEB_DIGEST: ${{ steps.build-web.outputs.digest }}
          PUBLISH_REQUIRED: ${{ steps.publication-state.outputs.publish_required }}
        run: |
          set -euo pipefail

          describe_digest() {
            aws ecr describe-images \
              --repository-name "$1" \
              --image-ids "imageTag=${GITHUB_SHA}" \
              --query 'imageDetails[0].imageDigest' \
              --output text
          }

          api_digest="$(describe_digest "$API_REPOSITORY_NAME")"
          web_digest="$(describe_digest "$WEB_REPOSITORY_NAME")"

          [[ "$api_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "ECR returned an invalid API digest" >&2
            exit 1
          }
          [[ "$web_digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "ECR returned an invalid Web digest" >&2
            exit 1
          }

          if [[ "$PUBLISH_REQUIRED" == "true" ]]; then
            [[ "$api_digest" == "$BUILDX_API_DIGEST" ]] || {
              echo "API ECR digest does not match Buildx output" >&2
              exit 1
            }
            [[ "$web_digest" == "$BUILDX_WEB_DIGEST" ]] || {
              echo "Web ECR digest does not match Buildx output" >&2
              exit 1
            }
          fi

          echo "api_digest=$api_digest" >> "$GITHUB_OUTPUT"
          echo "web_digest=$web_digest" >> "$GITHUB_OUTPUT"

      - name: Record immutable image references
        shell: bash
        env:
          API_DIGEST: ${{ steps.verify-images.outputs.api_digest }}
          WEB_DIGEST: ${{ steps.verify-images.outputs.web_digest }}
        run: |
          {
            echo "## Staging ARM64 images"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- API: \`${ECR_REGISTRY}/${API_REPOSITORY_NAME}@${API_DIGEST}\`"
            echo "- Web: \`${ECR_REGISTRY}/${WEB_REPOSITORY_NAME}@${WEB_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
