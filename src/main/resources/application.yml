spring:
  application:
    name: time-archive
  datasource:
    url: ${TIME_ARCHIVE_DATABASE_URL:jdbc:postgresql://localhost:5432/time_archive}
    username: ${TIME_ARCHIVE_DATABASE_USERNAME:time_archive}
    password: ${TIME_ARCHIVE_DATABASE_PASSWORD:time_archive}
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

time-archive:
  storage:
    s3:
      endpoint: ${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:http://localhost:9000}
      presigned-url-endpoint: ${TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT:${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:http://localhost:9000}}
      public-base-url: ${TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL:http://localhost:9000/time-archive-media}
      bucket: ${TIME_ARCHIVE_STORAGE_S3_BUCKET:time-archive-media}
      region: ${TIME_ARCHIVE_STORAGE_S3_REGION:us-east-1}
      access-key: ${TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY:time_archive_minio}
      secret-key: ${TIME_ARCHIVE_STORAGE_S3_SECRET_KEY:time_archive_minio_secret}
      path-style-access: ${TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS:true}
      upload-url-expiration-seconds: ${TIME_ARCHIVE_STORAGE_S3_UPLOAD_URL_EXPIRATION_SECONDS:600}
