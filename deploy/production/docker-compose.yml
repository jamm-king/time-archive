name: time-archive-${TIME_ARCHIVE_ENVIRONMENT:?Set TIME_ARCHIVE_ENVIRONMENT}

x-api-environment: &api-environment
  TIME_ARCHIVE_DATABASE_URL: ${TIME_ARCHIVE_DATABASE_URL:?Set TIME_ARCHIVE_DATABASE_URL}
  TIME_ARCHIVE_DATABASE_USERNAME: ${TIME_ARCHIVE_DATABASE_USERNAME:?Set TIME_ARCHIVE_DATABASE_USERNAME}
  TIME_ARCHIVE_DATABASE_PASSWORD: ${TIME_ARCHIVE_DATABASE_PASSWORD:?Set TIME_ARCHIVE_DATABASE_PASSWORD}
  TIME_ARCHIVE_REDIS_HOST: redis
  TIME_ARCHIVE_REDIS_PORT: "6379"
  TIME_ARCHIVE_PAYMENT_FAKE_ENABLED: "false"
  TIME_ARCHIVE_RATE_LIMIT_ENABLED: "true"
  TIME_ARCHIVE_RATE_LIMIT_CLIENT_IP_HEADER: ${TIME_ARCHIVE_RATE_LIMIT_CLIENT_IP_HEADER:-}
  TIME_ARCHIVE_RATE_LIMIT_KEY_SALT: ${TIME_ARCHIVE_RATE_LIMIT_KEY_SALT:?Set TIME_ARCHIVE_RATE_LIMIT_KEY_SALT}
  TIME_ARCHIVE_INITIAL_ADMIN_EMAILS: ""
  TIME_ARCHIVE_STORAGE_S3_ENDPOINT: ${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:?Set TIME_ARCHIVE_STORAGE_S3_ENDPOINT}
  TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT: ${TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT:?Set TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT}
  TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL: ${TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL:?Set TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL}
  TIME_ARCHIVE_STORAGE_S3_BUCKET: ${TIME_ARCHIVE_STORAGE_S3_BUCKET:?Set TIME_ARCHIVE_STORAGE_S3_BUCKET}
  TIME_ARCHIVE_STORAGE_S3_REGION: ${TIME_ARCHIVE_STORAGE_S3_REGION:-auto}
  TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY: ${TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY:?Set TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY}
  TIME_ARCHIVE_STORAGE_S3_SECRET_KEY: ${TIME_ARCHIVE_STORAGE_S3_SECRET_KEY:?Set TIME_ARCHIVE_STORAGE_S3_SECRET_KEY}
  TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS: ${TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS:-true}
  SERVER_FORWARD_HEADERS_STRATEGY: framework
  SERVER_SERVLET_SESSION_COOKIE_HTTP_ONLY: "true"
  SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
  SERVER_SERVLET_SESSION_COOKIE_SAME_SITE: lax

x-container-defaults: &container-defaults
  init: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  networks:
    - application

services:
  migrate:
    profiles:
      - migration
    image: ${TIME_ARCHIVE_API_IMAGE:?Set TIME_ARCHIVE_API_IMAGE}
    pull_policy: always
    environment:
      <<: *api-environment
      SPRING_FLYWAY_ENABLED: "true"
    command:
      - --spring.main.web-application-type=none
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    init: true
    security_opt:
      - no-new-privileges:true
    networks:
      - application
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?Set AWS_REGION}
        awslogs-group: ${TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX:?Set TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX}/migration
        mode: non-blocking
        max-buffer-size: 4m

  api:
    <<: *container-defaults
    image: ${TIME_ARCHIVE_API_IMAGE:?Set TIME_ARCHIVE_API_IMAGE}
    pull_policy: always
    environment:
      <<: *api-environment
      SPRING_FLYWAY_ENABLED: "false"
      JAVA_TOOL_OPTIONS: ${TIME_ARCHIVE_API_JAVA_TOOL_OPTIONS:--Xms256m -Xmx768m}
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: 1280m
    stop_grace_period: 30s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?Set AWS_REGION}
        awslogs-group: ${TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX:?Set TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX}/api
        mode: non-blocking
        max-buffer-size: 4m

  web:
    <<: *container-defaults
    image: ${TIME_ARCHIVE_WEB_IMAGE:?Set TIME_ARCHIVE_WEB_IMAGE}
    pull_policy: always
    environment:
      NODE_ENV: production
      TIME_ARCHIVE_API_BASE_URL: http://api:8080
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    mem_limit: 512m
    stop_grace_period: 20s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?Set AWS_REGION}
        awslogs-group: ${TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX:?Set TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX}/web
        mode: non-blocking
        max-buffer-size: 4m

  redis:
    <<: *container-defaults
    image: ${TIME_ARCHIVE_REDIS_IMAGE:?Set TIME_ARCHIVE_REDIS_IMAGE}
    pull_policy: always
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 384m
    stop_grace_period: 30s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?Set AWS_REGION}
        awslogs-group: ${TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX:?Set TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX}/redis
        mode: non-blocking
        max-buffer-size: 4m

  cloudflared:
    <<: *container-defaults
    image: ${TIME_ARCHIVE_CLOUDFLARED_IMAGE:?Set TIME_ARCHIVE_CLOUDFLARED_IMAGE}
    pull_policy: always
    command:
      - tunnel
      - --no-autoupdate
      - run
    environment:
      TUNNEL_TOKEN: ${TIME_ARCHIVE_CLOUDFLARE_TUNNEL_TOKEN:?Set TIME_ARCHIVE_CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    mem_limit: 128m
    stop_grace_period: 20s
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:?Set AWS_REGION}
        awslogs-group: ${TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX:?Set TIME_ARCHIVE_CLOUDWATCH_LOG_GROUP_PREFIX}/cloudflared
        mode: non-blocking
        max-buffer-size: 4m

networks:
  application:
    driver: bridge

volumes:
  redis-data:
    name: time-archive-${TIME_ARCHIVE_ENVIRONMENT}-redis-data
