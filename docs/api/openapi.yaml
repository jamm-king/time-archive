openapi: 3.1.0
info:
  title: Time Archive API
  version: 0.1.0
  description: |
    Development-stage API contract for the Time Archive MVP purchase flow.

    The current API exposes reservation and checkout creation only. It does not
    implement production authentication, real payment provider integration, or
    payment completion through browser redirects.

    The `buyerId` request field is temporary development-stage behavior. Before
    production, buyer identity must come from authenticated server-side identity.

    Owned range media endpoints temporarily accept `X-User-Id` as a
    development-stage stand-in for authenticated server-side identity.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Archive
    description: Public archive read operations.
  - name: Purchase
    description: Primary purchase reservation and checkout operations.
  - name: Media
    description: Owned range media metadata operations.
  - name: Admin
    description: Development-stage admin operations.
  - name: Payment
    description: Development-stage payment event operations.
paths:
  /api/archive/availability:
    get:
      tags:
        - Archive
      operationId: checkAvailability
      summary: Check time range availability
      description: |
        Checks whether a candidate range in the canonical 24-hour Time Archive
        timeline is available for reservation.

        Availability is an advisory read. Reservation creation remains the
        source of truth because another request may reserve the range after this
        response is returned.
      parameters:
        - name: startSecond
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
        - name: endSecond
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
      responses:
        "200":
          description: Availability result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/purchase/reservations:
    post:
      tags:
        - Purchase
      operationId: createPurchaseReservation
      summary: Create a purchase reservation
      description: |
        Creates a temporary hold for an available range in the canonical
        24-hour Time Archive timeline.

        This endpoint is development-stage only because `buyerId` is accepted
        from the request body. Production APIs must derive buyer identity from
        authenticated server-side identity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: Reservation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "409":
          description: The requested time range is already owned or reserved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/purchase/reservations/{reservationId}/checkout:
    post:
      tags:
        - Purchase
      operationId: createCheckout
      summary: Create checkout for a held reservation
      description: |
        Creates a provider-neutral checkout session for a held, unexpired
        reservation and transitions the reservation to `CHECKOUT_CREATED`.

        The returned checkout URL is only a payment-provider redirect target.
        It is not proof of payment and must not grant ownership. Ownership can
        only be granted by verified payment confirmation.
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Reservation identifier.
      responses:
        "200":
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          description: Reservation was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Reservation is expired or not payable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media:
    post:
      tags:
        - Media
      operationId: createOwnedRangeMediaAsset
      summary: Attach media metadata to an owned range
      description: |
        Creates a `MediaAsset` in `UPLOADED` status for an active ownership
        record owned by the current user.

        This endpoint accepts media metadata URLs only. It does not upload file
        bytes, validate object storage state, or approve media for public
        display.

        `X-User-Id` is temporary development-stage behavior. Production APIs
        must derive the current user from authenticated server-side identity.
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
        - $ref: "#/components/parameters/CurrentUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnedRangeMediaRequest"
      responses:
        "201":
          description: Media asset created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
    get:
      tags:
        - Media
      operationId: listOwnedRangeMediaAssets
      summary: List media metadata for an owned range
      description: |
        Lists media assets attached to an active ownership record owned by the
        current user. Owner reads include all moderation statuses.

        `X-User-Id` is temporary development-stage behavior. Production APIs
        must derive the current user from authenticated server-side identity.
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
        - $ref: "#/components/parameters/CurrentUserId"
      responses:
        "200":
          description: Media assets attached to the owned range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media/upload-requests:
    post:
      tags:
        - Media
      operationId: createOwnedRangeMediaUploadRequest
      summary: Create a presigned media upload request
      description: |
        Creates a short-lived S3-compatible presigned PUT URL for an active
        ownership record owned by the current user.

        The server generates the object key and records upload request metadata
        for a later completion step. This endpoint does not prove that the file
        was uploaded and does not create a `MediaAsset`.

        `X-User-Id` is temporary development-stage behavior. Production APIs
        must derive the current user from authenticated server-side identity.
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
        - $ref: "#/components/parameters/CurrentUserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaUploadRequest"
      responses:
        "201":
          description: Upload request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaUploadRequestResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media/upload-requests/{uploadRequestId}/complete:
    post:
      tags:
        - Media
      operationId: completeOwnedRangeMediaUpload
      summary: Complete and verify a media upload request
      description: |
        Verifies that the expected object exists in S3-compatible storage and
        matches the stored upload request metadata. On success, the upload
        request is marked `COMPLETED` and an `UPLOADED` `MediaAsset` is created.

        The endpoint is idempotent for already completed upload requests and
        returns the existing media asset.

        `X-User-Id` is temporary development-stage behavior. Production APIs
        must derive the current user from authenticated server-side identity.
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
        - name: uploadRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Upload request identifier.
        - $ref: "#/components/parameters/CurrentUserId"
      responses:
        "200":
          description: Upload request completed or already completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMediaUploadResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record or upload request was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Upload request or uploaded object cannot be completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets:
    get:
      tags:
        - Admin
      operationId: listAdminMediaAssets
      summary: List media assets for moderation
      description: |
        Lists media assets by moderation status for admin review.

        `X-Admin-Id` is temporary development-stage behavior. Production APIs
        must derive admin identity and permissions from authenticated server-side
        identity and RBAC.
      parameters:
        - $ref: "#/components/parameters/AdminId"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ModerationStatus"
          description: Moderation status to list. Defaults to `UPLOADED`.
      responses:
        "200":
          description: Media assets matching the moderation status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/approve:
    post:
      tags:
        - Admin
      operationId: approveMediaAsset
      summary: Approve media asset
      description: |
        Approves an uploaded media asset and sets the approved public media URL.

        `X-Admin-Id` is temporary development-stage behavior. Production APIs
        must derive admin identity and permissions from authenticated server-side
        identity and RBAC.
      parameters:
        - $ref: "#/components/parameters/AdminId"
        - $ref: "#/components/parameters/MediaAssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMediaAssetRequest"
      responses:
        "200":
          description: Media asset approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not approvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/reject:
    post:
      tags:
        - Admin
      operationId: rejectMediaAsset
      summary: Reject media asset
      description: |
        Rejects an uploaded media asset before public approval.

        `X-Admin-Id` is temporary development-stage behavior. Production APIs
        must derive admin identity and permissions from authenticated server-side
        identity and RBAC.
      parameters:
        - $ref: "#/components/parameters/AdminId"
        - $ref: "#/components/parameters/MediaAssetId"
      responses:
        "200":
          description: Media asset rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not rejectable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/hide:
    post:
      tags:
        - Admin
      operationId: hideMediaAsset
      summary: Hide approved media asset
      description: |
        Hides previously approved media from public timeline eligibility.

        `X-Admin-Id` is temporary development-stage behavior. Production APIs
        must derive admin identity and permissions from authenticated server-side
        identity and RBAC.
      parameters:
        - $ref: "#/components/parameters/AdminId"
        - $ref: "#/components/parameters/MediaAssetId"
      responses:
        "200":
          description: Media asset hidden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not hideable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/internal/payments/fake/webhooks/primary-purchase-completed:
    post:
      tags:
        - Payment
      operationId: completeFakePrimaryPurchasePayment
      summary: Complete primary purchase with a fake payment event
      description: |
        Development-stage endpoint for local primary purchase verification.

        This endpoint simulates a payment provider webhook and calls the
        primary purchase completion workflow. It is not production-safe.
        Production payment providers must use verified webhook signatures and
        must not trust browser redirects as payment confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FakePrimaryPurchasePaymentWebhookRequest"
      responses:
        "200":
          description: Payment event processed or already processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryPurchasePaymentWebhookResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          description: Reservation was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Payment event or reservation state prevents completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
components:
  parameters:
    OwnershipRecordId:
      name: ownershipRecordId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Ownership record identifier.
    CurrentUserId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Temporary development-stage current user identifier.
    AdminId:
      name: X-Admin-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Temporary development-stage admin identifier.
    MediaAssetId:
      name: mediaAssetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Media asset identifier.
  responses:
    InvalidRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ResourceNotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    UnexpectedError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
  schemas:
    CreateReservationRequest:
      type: object
      additionalProperties: false
      required:
        - buyerId
        - startSecond
        - endSecond
      properties:
        buyerId:
          type: string
          format: uuid
          description: Temporary development-stage buyer identifier.
          examples:
            - "00000000-0000-0000-0000-000000000001"
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
          examples:
            - 3600
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
          examples:
            - 3660
    ReservationResponse:
      type: object
      additionalProperties: false
      required:
        - reservationId
        - buyerId
        - startSecond
        - endSecond
        - amountCents
        - currency
        - status
        - expiresAt
      properties:
        reservationId:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        amountCents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          enum:
            - USD
        status:
          type: string
          enum:
            - HELD
            - CHECKOUT_CREATED
            - COMPLETED
            - EXPIRED
            - CANCELLED
        expiresAt:
          type: string
          format: date-time
    CheckoutSessionResponse:
      type: object
      additionalProperties: false
      required:
        - provider
        - providerReference
        - checkoutUrl
      properties:
        provider:
          type: string
          minLength: 1
          examples:
            - fake
        providerReference:
          type: string
          minLength: 1
          examples:
            - fake_checkout_00000000-0000-0000-0000-000000000010
        checkoutUrl:
          type: string
          format: uri
          examples:
            - https://payments.example.test/checkout/00000000-0000-0000-0000-000000000010
    AvailabilityResponse:
      type: object
      additionalProperties: false
      required:
        - startSecond
        - endSecond
        - available
        - conflicts
      properties:
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        available:
          type: boolean
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityConflict"
    AvailabilityConflict:
      type: object
      additionalProperties: false
      required:
        - type
        - startSecond
        - endSecond
      properties:
        type:
          type: string
          enum:
            - OWNERSHIP
            - RESERVATION
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
    CreateOwnedRangeMediaRequest:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - originalFileUrl
      properties:
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFileUrl:
          type: string
          minLength: 1
          format: uri
          description: Original media file URL. This is not public until moderation approves a derived asset.
          examples:
            - https://cdn.example.test/uploads/original.png
        thumbnailUrl:
          type: string
          minLength: 1
          format: uri
          nullable: true
          examples:
            - https://cdn.example.test/uploads/thumb.png
        externalLink:
          type: string
          minLength: 1
          format: uri
          nullable: true
          examples:
            - https://example.com/archive-note
    CreateMediaUploadRequest:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - originalFilename
        - contentType
        - contentLengthBytes
      properties:
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFilename:
          type: string
          minLength: 1
          maxLength: 255
          examples:
            - original.png
        contentType:
          type: string
          minLength: 1
          maxLength: 100
          description: |
            Expected upload content type. The current MVP policy allows
            `image/jpeg`, `image/png`, `image/webp`, and `video/mp4`.
          examples:
            - image/png
        contentLengthBytes:
          type: integer
          format: int64
          minimum: 1
          description: Expected upload size in bytes.
          examples:
            - 1048576
    ApproveMediaAssetRequest:
      type: object
      additionalProperties: false
      required:
        - approvedFileUrl
      properties:
        approvedFileUrl:
          type: string
          minLength: 1
          format: uri
          description: Public media URL approved for timeline use.
          examples:
            - https://cdn.example.test/approved.png
        thumbnailUrl:
          type: string
          minLength: 1
          format: uri
          nullable: true
          examples:
            - https://cdn.example.test/thumb.png
    MediaUploadRequestResponse:
      type: object
      additionalProperties: false
      required:
        - uploadRequestId
        - ownershipRecordId
        - ownerId
        - mediaType
        - originalFilename
        - contentType
        - contentLengthBytes
        - originalFileUrl
        - uploadUrl
        - requiredHeaders
        - status
        - expiresAt
        - createdAt
      properties:
        uploadRequestId:
          type: string
          format: uuid
        ownershipRecordId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFilename:
          type: string
        contentType:
          type: string
        contentLengthBytes:
          type: integer
          format: int64
        originalFileUrl:
          type: string
          format: uri
          description: Server-generated storage URL for later completion verification.
        uploadUrl:
          type: string
          format: uri
          description: Short-lived presigned PUT URL.
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: Headers the client must send with the PUT upload.
        status:
          $ref: "#/components/schemas/MediaUploadRequestStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CompleteMediaUploadResponse:
      type: object
      additionalProperties: false
      required:
        - uploadRequestId
        - mediaAsset
        - alreadyCompleted
      properties:
        uploadRequestId:
          type: string
          format: uuid
        mediaAsset:
          $ref: "#/components/schemas/MediaAssetResponse"
        alreadyCompleted:
          type: boolean
    MediaAssetResponse:
      type: object
      additionalProperties: false
      required:
        - mediaAssetId
        - ownershipRecordId
        - ownerId
        - mediaType
        - originalFileUrl
        - approvedFileUrl
        - thumbnailUrl
        - externalLink
        - moderationStatus
        - publiclyVisible
        - createdAt
        - updatedAt
      properties:
        mediaAssetId:
          type: string
          format: uuid
        ownershipRecordId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFileUrl:
          type: string
          format: uri
        approvedFileUrl:
          type: string
          format: uri
          nullable: true
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        externalLink:
          type: string
          format: uri
          nullable: true
        moderationStatus:
          $ref: "#/components/schemas/ModerationStatus"
        publiclyVisible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MediaType:
      type: string
      enum:
        - IMAGE
        - VIDEO
    ModerationStatus:
      type: string
      enum:
        - UPLOADED
        - PENDING_REVIEW
        - APPROVED
        - REJECTED
        - HIDDEN
        - DELETED_BY_OWNER
    MediaUploadRequestStatus:
      type: string
      enum:
        - REQUESTED
        - COMPLETED
        - EXPIRED
    FakePrimaryPurchasePaymentWebhookRequest:
      type: object
      additionalProperties: false
      required:
        - providerEventId
        - eventType
        - payloadHash
        - reservationId
        - paymentReference
      properties:
        providerEventId:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - evt_local_1
        eventType:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - payment_intent.succeeded
        payloadHash:
          type: string
          minLength: 1
          maxLength: 200
          description: Development-stage payload hash supplied by local test clients.
          examples:
            - sha256-local-test-payload
        reservationId:
          type: string
          format: uuid
        paymentReference:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - pi_local_1
        requestId:
          type: string
          minLength: 1
          maxLength: 200
          nullable: true
          examples:
            - local-request-1
    PrimaryPurchasePaymentWebhookResponse:
      type: object
      additionalProperties: false
      required:
        - purchaseId
        - ownershipRecordId
        - alreadyProcessed
      properties:
        purchaseId:
          type: string
          format: uuid
        ownershipRecordId:
          type: string
          format: uuid
          nullable: true
        alreadyProcessed:
          type: boolean
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - details
      properties:
        code:
          $ref: "#/components/schemas/ApiErrorCode"
        message:
          type: string
          minLength: 1
        details:
          type: array
          items:
            $ref: "#/components/schemas/ApiErrorDetail"
    ApiErrorCode:
      type: string
      enum:
        - INVALID_REQUEST
        - RESOURCE_NOT_FOUND
        - TIME_RANGE_ALREADY_OWNED
        - TIME_RANGE_ALREADY_RESERVED
        - RESERVATION_EXPIRED
        - RESERVATION_NOT_PAYABLE
        - PAYMENT_EVENT_ALREADY_PROCESSING
        - OWNERSHIP_ACCESS_DENIED
        - OWNERSHIP_NOT_ACTIVE
        - MEDIA_UPLOAD_REQUEST_EXPIRED
        - MEDIA_UPLOAD_REQUEST_NOT_COMPLETABLE
        - MEDIA_UPLOAD_OBJECT_NOT_FOUND
        - MEDIA_UPLOAD_OBJECT_MISMATCH
        - MEDIA_ASSET_NOT_APPROVABLE
        - MEDIA_ASSET_NOT_REJECTABLE
        - MEDIA_ASSET_NOT_HIDEABLE
        - UNEXPECTED_ERROR
    ApiErrorDetail:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field path related to the error. Use `null` for non-field errors.
          nullable: true
          examples:
            - startSecond
        message:
          type: string
          minLength: 1
