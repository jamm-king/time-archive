openapi: 3.1.0
info:
  title: Time Archive API
  version: 0.1.0
  description: |
    Development-stage API contract for the Time Archive MVP purchase flow.

    The current API includes development-stage session authentication,
    reservation, checkout, media upload, moderation, and public timeline
    surfaces. It does not implement real payment provider integration or
    payment completion through browser redirects.

    Purchase, owned range media, and admin moderation endpoints derive identity
    from the authenticated server-side session. Browser mutation requests use a
    CSRF token from `GET /api/csrf` and echo it through `X-XSRF-TOKEN`.
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: Session authentication and current-user operations.
  - name: Archive
    description: Public archive read operations.
  - name: Purchase
    description: Primary purchase reservation and checkout operations.
  - name: Media
    description: Owned range media metadata operations.
  - name: Admin
    description: Development-stage admin operations.
  - name: Payment
    description: Development-stage payment event operations.
paths:
  /api/csrf:
    get:
      tags:
        - Auth
      operationId: getCsrfToken
      summary: Get CSRF token
      description: |
        Returns the CSRF token metadata for browser clients. Clients should keep
        the session cookie and send the returned token value in `X-XSRF-TOKEN`
        for mutating API requests.
      responses:
        "200":
          description: CSRF token metadata.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cookie-backed CSRF token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfTokenResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/auth/register:
    post:
      tags:
        - Auth
      operationId: registerUser
      summary: Register a local MVP user
      description: |
        Creates a local MVP user account and signs the browser in through a
        server-side session cookie.

        This endpoint is intentionally minimal and does not perform email
        verification or password reset flows.
      security:
        - CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered and signed in.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly server session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "403":
          $ref: "#/components/responses/CsrfTokenInvalid"
        "409":
          description: Email is already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/auth/login:
    post:
      tags:
        - Auth
      operationId: loginUser
      summary: Log in with email and password
      description: |
        Authenticates a local MVP user and signs the browser in through a
        server-side session cookie.
      security:
        - CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated and signed in.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly server session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfTokenInvalid"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/auth/logout:
    post:
      tags:
        - Auth
      operationId: logoutUser
      summary: Log out current session
      description: Invalidates the current server-side session if one exists.
      security:
        - SessionCookie: []
          CsrfHeader: []
      responses:
        "204":
          description: Session invalidated.
        "403":
          $ref: "#/components/responses/CsrfTokenInvalid"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/me:
    get:
      tags:
        - Auth
      operationId: getCurrentUser
      summary: Get current user
      description: Returns the current authenticated user derived from the server-side session.
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/me/owned-ranges:
    get:
      tags:
        - Auth
      operationId: listCurrentUserOwnedRanges
      summary: List current user's owned ranges
      description: |
        Lists active ownership records owned by the current authenticated user.
        The response is scoped to the session identity and does not expose
        `ownerId`.
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Active owned ranges for the current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CurrentUserOwnedRangeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/archive/availability:
    get:
      tags:
        - Archive
      operationId: checkAvailability
      summary: Check time range availability
      description: |
        Checks whether a candidate range in the canonical 24-hour Time Archive
        timeline is available for reservation.

        Availability is an advisory read. Reservation creation remains the
        source of truth because another request may reserve the range after this
        response is returned.
      parameters:
        - name: startSecond
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
        - name: endSecond
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
      responses:
        "200":
          description: Availability result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/timeline:
    get:
      tags:
        - Archive
      operationId: listPublicTimelineSegments
      summary: List public timeline segments
      description: |
        Lists approved media segments for a requested window of the canonical
        24-hour Time Archive timeline.

        The response is public-player safe. It only includes approved media
        as short-lived presigned playback URLs and does not expose owner
        identifiers, original upload URLs, stored approved object references,
        or moderation metadata. Responses are not intended for shared caching
        while they embed presigned URLs.
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
            maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
        - name: to
          in: query
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
      responses:
        "200":
          description: Public timeline segments for the requested window.
          headers:
            Cache-Control:
              schema:
                type: string
              description: Uses `no-store` because the response embeds short-lived presigned URLs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTimelineResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/purchase/reservations:
    post:
      tags:
        - Purchase
      operationId: createPurchaseReservation
      summary: Create a purchase reservation
      description: |
        Creates a temporary hold for an available range in the canonical
        24-hour Time Archive timeline.

        Buyer identity is derived from the authenticated server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: Reservation created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/CsrfTokenInvalid"
        "409":
          description: The requested time range is already owned or reserved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/purchase/reservations/{reservationId}/checkout:
    post:
      tags:
        - Purchase
      operationId: createCheckout
      summary: Create checkout for a held reservation
      description: |
        Creates a provider-neutral checkout session for a held, unexpired
        reservation and transitions the reservation to `CHECKOUT_CREATED`.

        The returned checkout URL is only a payment-provider redirect target.
        It is not proof of payment and must not grant ownership. Ownership can
        only be granted by verified payment confirmation.

        Checkout creation is allowed only for the authenticated user who owns
        the reservation.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Reservation identifier.
      responses:
        "200":
          description: Checkout session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Reservation does not belong to the current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Reservation was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Reservation is expired or not payable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media:
    post:
      tags:
        - Media
      operationId: createOwnedRangeMediaAsset
      summary: Attach media metadata to an owned range
      description: |
        Creates a `MediaAsset` in `UPLOADED` status for an active ownership
        record owned by the current user.

        This endpoint accepts media metadata URLs only. It does not upload file
        bytes, validate object storage state, or approve media for public
        display.

        The current user is derived from the authenticated server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnedRangeMediaRequest"
      responses:
        "201":
          description: Media asset created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
    get:
      tags:
        - Media
      operationId: listOwnedRangeMediaAssets
      summary: List media metadata for an owned range
      description: |
        Lists media assets attached to an active ownership record owned by the
        current user. Owner reads include all moderation statuses.

        The current user is derived from the authenticated server-side session.
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
      responses:
        "200":
          description: Media assets attached to the owned range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media/upload-requests:
    post:
      tags:
        - Media
      operationId: createOwnedRangeMediaUploadRequest
      summary: Create a presigned media upload request
      description: |
        Creates a short-lived S3-compatible presigned PUT URL for an active
        ownership record owned by the current user.

        The server generates the object key and records upload request metadata
        for a later completion step. This endpoint does not prove that the file
        was uploaded and does not create a `MediaAsset`.

        The current user is derived from the authenticated server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaUploadRequest"
      responses:
        "201":
          description: Upload request created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaUploadRequestResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Ownership record is not active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/owned-ranges/{ownershipRecordId}/media/upload-requests/{uploadRequestId}/complete:
    post:
      tags:
        - Media
      operationId: completeOwnedRangeMediaUpload
      summary: Complete and verify a media upload request
      description: |
        Verifies that the expected object exists in S3-compatible storage and
        matches the stored upload request metadata. On success, the upload
        request is marked `COMPLETED` and an `UPLOADED` `MediaAsset` is created.

        The endpoint is idempotent for already completed upload requests and
        returns the existing media asset.

        The current user is derived from the authenticated server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/OwnershipRecordId"
        - name: uploadRequestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Upload request identifier.
      responses:
        "200":
          description: Upload request completed or already completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMediaUploadResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not own the requested range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: Ownership record or upload request was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Upload request or uploaded object cannot be completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets:
    get:
      tags:
        - Admin
      operationId: listAdminMediaAssets
      summary: List media assets for moderation
      description: |
        Lists media assets by moderation status for admin review.

        Admin identity and permissions are derived from the authenticated
        server-side session.
      security:
        - SessionCookie: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ModerationStatus"
          description: Moderation status to list. Defaults to `UPLOADED`.
      responses:
        "200":
          description: Media assets matching the moderation status.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not have admin permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/approve:
    post:
      tags:
        - Admin
      operationId: approveMediaAsset
      summary: Approve media asset
      description: |
        Approves an uploaded media asset and sets the approved media storage
        reference. The approved file URL and thumbnail URL, when present, must
        belong to the configured object storage base URL so public timeline
        reads can generate short-lived presigned playback URLs.

        Admin identity and permissions are derived from the authenticated
        server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/MediaAssetId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveMediaAssetRequest"
      responses:
        "200":
          description: Media asset approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not have admin permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not approvable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/preview-url:
    get:
      tags:
        - Admin
      operationId: createAdminMediaPreviewUrl
      summary: Create original media preview URL
      description: |
        Creates a short-lived presigned download URL for the uploaded original
        media file so admins can review private object-storage media.

        Admin identity and permissions are derived from the authenticated
        server-side session. The returned URL is time-limited and should not be
        persisted by clients.
      security:
        - SessionCookie: []
      parameters:
        - $ref: "#/components/parameters/MediaAssetId"
      responses:
        "200":
          description: Short-lived preview URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMediaPreviewUrlResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not have admin permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/reject:
    post:
      tags:
        - Admin
      operationId: rejectMediaAsset
      summary: Reject media asset
      description: |
        Rejects an uploaded media asset before public approval.

        Admin identity and permissions are derived from the authenticated
        server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/MediaAssetId"
      responses:
        "200":
          description: Media asset rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not have admin permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not rejectable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/admin/media/assets/{mediaAssetId}/hide:
    post:
      tags:
        - Admin
      operationId: hideMediaAsset
      summary: Hide approved media asset
      description: |
        Hides previously approved media from public timeline eligibility.

        Admin identity and permissions are derived from the authenticated
        server-side session.
      security:
        - SessionCookie: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/MediaAssetId"
      responses:
        "200":
          description: Media asset hidden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The current user does not have admin permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          description: Media asset is not hideable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
  /api/internal/payments/fake/webhooks/primary-purchase-completed:
    post:
      tags:
        - Payment
      operationId: completeFakePrimaryPurchasePayment
      summary: Complete primary purchase with a fake payment event
      description: |
        Development-stage endpoint for local primary purchase verification.

        This endpoint simulates a payment provider webhook and calls the
        primary purchase completion workflow. It is not production-safe.
        Production payment providers must use verified webhook signatures and
        must not trust browser redirects as payment confirmation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FakePrimaryPurchasePaymentWebhookRequest"
      responses:
        "200":
          description: Payment event processed or already processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrimaryPurchasePaymentWebhookResponse"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "404":
          description: Reservation was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: Payment event or reservation state prevents completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "500":
          $ref: "#/components/responses/UnexpectedError"
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: SESSION
    CsrfHeader:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
  parameters:
    OwnershipRecordId:
      name: ownershipRecordId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Ownership record identifier.
    MediaAssetId:
      name: mediaAssetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Media asset identifier.
  responses:
    InvalidRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    ResourceNotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    Unauthorized:
      description: Authentication is required or credentials are invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    CsrfTokenInvalid:
      description: CSRF token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    UnexpectedError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
  schemas:
    CsrfTokenResponse:
      type: object
      additionalProperties: false
      required:
        - headerName
        - parameterName
        - token
      properties:
        headerName:
          type: string
          examples:
            - X-XSRF-TOKEN
        parameterName:
          type: string
          examples:
            - _csrf
        token:
          type: string
          minLength: 1
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
        - displayName
      properties:
        email:
          type: string
          format: email
          minLength: 1
          examples:
            - user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          writeOnly: true
        displayName:
          type: string
          minLength: 1
          maxLength: 80
          examples:
            - User
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 1
          examples:
            - user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          writeOnly: true
    CurrentUserResponse:
      type: object
      additionalProperties: false
      required:
        - userId
        - email
        - displayName
        - role
        - createdAt
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        role:
          type: string
          enum:
            - USER
            - ADMIN
        createdAt:
          type: string
          format: date-time
    CurrentUserOwnedRangeResponse:
      type: object
      additionalProperties: false
      required:
        - ownershipRecordId
        - startSecond
        - endSecond
        - status
        - acquiredAt
        - createdAt
        - updatedAt
      properties:
        ownershipRecordId:
          type: string
          format: uuid
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
        status:
          type: string
          enum:
            - ACTIVE
          description: Current visible ownership status for this user-scoped list.
        acquiredAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateReservationRequest:
      type: object
      additionalProperties: false
      required:
        - startSecond
        - endSecond
      properties:
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
          description: Inclusive start second in the canonical 24-hour timeline.
          examples:
            - 3600
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
          description: Exclusive end second in the canonical 24-hour timeline.
          examples:
            - 3660
    ReservationResponse:
      type: object
      additionalProperties: false
      required:
        - reservationId
        - buyerId
        - startSecond
        - endSecond
        - amountCents
        - currency
        - status
        - expiresAt
      properties:
        reservationId:
          type: string
          format: uuid
        buyerId:
          type: string
          format: uuid
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        amountCents:
          type: integer
          format: int64
          minimum: 1
        currency:
          type: string
          enum:
            - USD
        status:
          type: string
          enum:
            - HELD
            - CHECKOUT_CREATED
            - COMPLETED
            - EXPIRED
            - CANCELLED
        expiresAt:
          type: string
          format: date-time
    CheckoutSessionResponse:
      type: object
      additionalProperties: false
      required:
        - provider
        - providerReference
        - checkoutUrl
      properties:
        provider:
          type: string
          minLength: 1
          examples:
            - fake
        providerReference:
          type: string
          minLength: 1
          examples:
            - fake_checkout_00000000-0000-0000-0000-000000000010
        checkoutUrl:
          type: string
          format: uri
          examples:
            - https://payments.example.test/checkout/00000000-0000-0000-0000-000000000010
    AvailabilityResponse:
      type: object
      additionalProperties: false
      required:
        - startSecond
        - endSecond
        - available
        - conflicts
      properties:
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        available:
          type: boolean
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityConflict"
    AvailabilityConflict:
      type: object
      additionalProperties: false
      required:
        - type
        - startSecond
        - endSecond
      properties:
        type:
          type: string
          enum:
            - OWNERSHIP
            - RESERVATION
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
    CreateOwnedRangeMediaRequest:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - originalFileUrl
      properties:
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFileUrl:
          type: string
          minLength: 1
          format: uri
          description: Original media file URL. This is not public until moderation approves a derived asset.
          examples:
            - https://cdn.example.test/uploads/original.png
        thumbnailUrl:
          type:
            - string
            - "null"
          minLength: 1
          format: uri
          examples:
            - https://cdn.example.test/uploads/thumb.png
        externalLink:
          type:
            - string
            - "null"
          minLength: 1
          format: uri
          examples:
            - https://example.com/archive-note
    CreateMediaUploadRequest:
      type: object
      additionalProperties: false
      required:
        - mediaType
        - originalFilename
        - contentType
        - contentLengthBytes
      properties:
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFilename:
          type: string
          minLength: 1
          maxLength: 255
          examples:
            - original.png
        contentType:
          type: string
          minLength: 1
          maxLength: 100
          description: |
            Expected upload content type. The current MVP policy allows
            `image/jpeg`, `image/png`, `image/webp`, and `video/mp4`.
          examples:
            - image/png
        contentLengthBytes:
          type: integer
          format: int64
          minimum: 1
          description: Expected upload size in bytes.
          examples:
            - 1048576
    ApproveMediaAssetRequest:
      type: object
      additionalProperties: false
      required:
        - approvedFileUrl
      properties:
        approvedFileUrl:
          type: string
          minLength: 1
          format: uri
          description: Approved media storage reference used for timeline playback presigning.
          examples:
            - http://localhost:9000/time-archive-media/media/originals/example.png
        thumbnailUrl:
          type:
            - string
            - "null"
          minLength: 1
          format: uri
          description: Approved thumbnail storage reference used for timeline playback presigning.
          examples:
            - http://localhost:9000/time-archive-media/media/thumbnails/example.png
    AdminMediaPreviewUrlResponse:
      type: object
      additionalProperties: false
      required:
        - mediaAssetId
        - previewUrl
        - expiresAt
      properties:
        mediaAssetId:
          type: string
          format: uuid
        previewUrl:
          type: string
          format: uri
          description: Short-lived presigned GET URL for admin review.
        expiresAt:
          type: string
          format: date-time
    MediaUploadRequestResponse:
      type: object
      additionalProperties: false
      required:
        - uploadRequestId
        - ownershipRecordId
        - ownerId
        - mediaType
        - originalFilename
        - contentType
        - contentLengthBytes
        - originalFileUrl
        - uploadUrl
        - requiredHeaders
        - status
        - expiresAt
        - createdAt
      properties:
        uploadRequestId:
          type: string
          format: uuid
        ownershipRecordId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFilename:
          type: string
        contentType:
          type: string
        contentLengthBytes:
          type: integer
          format: int64
        originalFileUrl:
          type: string
          format: uri
          description: Server-generated storage URL for later completion verification.
        uploadUrl:
          type: string
          format: uri
          description: Short-lived presigned PUT URL.
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: Headers the client must send with the PUT upload.
        status:
          $ref: "#/components/schemas/MediaUploadRequestStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CompleteMediaUploadResponse:
      type: object
      additionalProperties: false
      required:
        - uploadRequestId
        - mediaAsset
        - alreadyCompleted
      properties:
        uploadRequestId:
          type: string
          format: uuid
        mediaAsset:
          $ref: "#/components/schemas/MediaAssetResponse"
        alreadyCompleted:
          type: boolean
    PublicTimelineResponse:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - segments
      properties:
        from:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        to:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        segments:
          type: array
          items:
            $ref: "#/components/schemas/PublicTimelineSegmentResponse"
    PublicTimelineSegmentResponse:
      type: object
      additionalProperties: false
      required:
        - startSecond
        - endSecond
        - mediaAssetId
        - mediaType
        - mediaUrl
        - thumbnailUrl
        - externalLink
      properties:
        startSecond:
          type: integer
          format: int64
          minimum: 0
          maximum: 86399
        endSecond:
          type: integer
          format: int64
          minimum: 1
          maximum: 86400
        mediaAssetId:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        mediaUrl:
          type: string
          format: uri
          description: Short-lived presigned GET URL for approved public playback.
        thumbnailUrl:
          type:
            - string
            - "null"
          format: uri
          description: Short-lived presigned GET URL for the approved thumbnail, when present.
        externalLink:
          type:
            - string
            - "null"
          format: uri
    MediaAssetResponse:
      type: object
      additionalProperties: false
      required:
        - mediaAssetId
        - ownershipRecordId
        - ownerId
        - mediaType
        - originalFileUrl
        - approvedFileUrl
        - thumbnailUrl
        - externalLink
        - moderationStatus
        - publiclyVisible
        - createdAt
        - updatedAt
      properties:
        mediaAssetId:
          type: string
          format: uuid
        ownershipRecordId:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        mediaType:
          $ref: "#/components/schemas/MediaType"
        originalFileUrl:
          type: string
          format: uri
        approvedFileUrl:
          type:
            - string
            - "null"
          format: uri
        thumbnailUrl:
          type:
            - string
            - "null"
          format: uri
        externalLink:
          type:
            - string
            - "null"
          format: uri
        moderationStatus:
          $ref: "#/components/schemas/ModerationStatus"
        publiclyVisible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MediaType:
      type: string
      enum:
        - IMAGE
        - VIDEO
    ModerationStatus:
      type: string
      enum:
        - UPLOADED
        - PENDING_REVIEW
        - APPROVED
        - REJECTED
        - HIDDEN
        - DELETED_BY_OWNER
    MediaUploadRequestStatus:
      type: string
      enum:
        - REQUESTED
        - COMPLETED
        - EXPIRED
    FakePrimaryPurchasePaymentWebhookRequest:
      type: object
      additionalProperties: false
      required:
        - providerEventId
        - eventType
        - payloadHash
        - reservationId
        - paymentReference
      properties:
        providerEventId:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - evt_local_1
        eventType:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - payment_intent.succeeded
        payloadHash:
          type: string
          minLength: 1
          maxLength: 200
          description: Development-stage payload hash supplied by local test clients.
          examples:
            - sha256-local-test-payload
        reservationId:
          type: string
          format: uuid
        paymentReference:
          type: string
          minLength: 1
          maxLength: 200
          examples:
            - pi_local_1
        requestId:
          type:
            - string
            - "null"
          minLength: 1
          maxLength: 200
          examples:
            - local-request-1
    PrimaryPurchasePaymentWebhookResponse:
      type: object
      additionalProperties: false
      required:
        - purchaseId
        - ownershipRecordId
        - alreadyProcessed
      properties:
        purchaseId:
          type: string
          format: uuid
        ownershipRecordId:
          type:
            - string
            - "null"
          format: uuid
        alreadyProcessed:
          type: boolean
    ApiErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
        - details
      properties:
        code:
          $ref: "#/components/schemas/ApiErrorCode"
        message:
          type: string
          minLength: 1
        details:
          type: array
          items:
            $ref: "#/components/schemas/ApiErrorDetail"
    ApiErrorCode:
      type: string
      enum:
        - INVALID_REQUEST
        - AUTHENTICATION_REQUIRED
        - ADMIN_ACCESS_DENIED
        - CSRF_TOKEN_INVALID
        - RESOURCE_NOT_FOUND
        - TIME_RANGE_ALREADY_OWNED
        - TIME_RANGE_ALREADY_RESERVED
        - RESERVATION_EXPIRED
        - RESERVATION_NOT_PAYABLE
        - PAYMENT_EVENT_ALREADY_PROCESSING
        - OWNERSHIP_ACCESS_DENIED
        - OWNERSHIP_NOT_ACTIVE
        - MEDIA_UPLOAD_REQUEST_EXPIRED
        - MEDIA_UPLOAD_REQUEST_NOT_COMPLETABLE
        - MEDIA_UPLOAD_OBJECT_NOT_FOUND
        - MEDIA_UPLOAD_OBJECT_MISMATCH
        - INVALID_MEDIA_STORAGE_REFERENCE
        - MEDIA_ASSET_NOT_APPROVABLE
        - MEDIA_ASSET_NOT_REJECTABLE
        - MEDIA_ASSET_NOT_HIDEABLE
        - UNEXPECTED_ERROR
    ApiErrorDetail:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type:
            - string
            - "null"
          description: Field path related to the error. Use `null` for non-field errors.
          examples:
            - startSecond
        message:
          type: string
          minLength: 1
