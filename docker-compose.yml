services:
  api:
    build:
      context: ./apps/api
    container_name: time-archive-api
    environment:
      TIME_ARCHIVE_DATABASE_URL: jdbc:postgresql://postgres:5432/${TIME_ARCHIVE_DATABASE_NAME:?Set TIME_ARCHIVE_DATABASE_NAME in .env.local}
      TIME_ARCHIVE_DATABASE_USERNAME: ${TIME_ARCHIVE_DATABASE_USERNAME:?Set TIME_ARCHIVE_DATABASE_USERNAME in .env.local}
      TIME_ARCHIVE_DATABASE_PASSWORD: ${TIME_ARCHIVE_DATABASE_PASSWORD:?Set TIME_ARCHIVE_DATABASE_PASSWORD in .env.local}
      TIME_ARCHIVE_STORAGE_S3_ENDPOINT: http://minio:9000
      TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT: http://localhost:9000
      TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL: http://localhost:9000/time-archive-media
      TIME_ARCHIVE_STORAGE_S3_BUCKET: time-archive-media
      TIME_ARCHIVE_STORAGE_S3_REGION: us-east-1
      TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY: ${TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY:?Set TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY in .env.local}
      TIME_ARCHIVE_STORAGE_S3_SECRET_KEY: ${TIME_ARCHIVE_STORAGE_S3_SECRET_KEY:?Set TIME_ARCHIVE_STORAGE_S3_SECRET_KEY in .env.local}
      TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS: "true"
      TIME_ARCHIVE_REDIS_HOST: redis
      TIME_ARCHIVE_REDIS_PORT: "6379"
      TIME_ARCHIVE_PAYMENT_FAKE_ENABLED: ${TIME_ARCHIVE_PAYMENT_FAKE_ENABLED:?Set TIME_ARCHIVE_PAYMENT_FAKE_ENABLED in .env.local}
      TIME_ARCHIVE_RATE_LIMIT_KEY_SALT: ${TIME_ARCHIVE_RATE_LIMIT_KEY_SALT:?Set TIME_ARCHIVE_RATE_LIMIT_KEY_SALT in .env.local}
      TIME_ARCHIVE_RATE_LIMIT_REGISTRATION_LIMIT: ${TIME_ARCHIVE_RATE_LIMIT_REGISTRATION_LIMIT:-100}
      TIME_ARCHIVE_INITIAL_ADMIN_EMAILS: ${TIME_ARCHIVE_INITIAL_ADMIN_EMAILS:-admin@time-archive.local}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ./apps/web
    container_name: time-archive-web
    environment:
      TIME_ARCHIVE_API_BASE_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: time-archive-postgres
    environment:
      POSTGRES_DB: ${TIME_ARCHIVE_DATABASE_NAME:?Set TIME_ARCHIVE_DATABASE_NAME in .env.local}
      POSTGRES_USER: ${TIME_ARCHIVE_DATABASE_USERNAME:?Set TIME_ARCHIVE_DATABASE_USERNAME in .env.local}
      POSTGRES_PASSWORD: ${TIME_ARCHIVE_DATABASE_PASSWORD:?Set TIME_ARCHIVE_DATABASE_PASSWORD in .env.local}
    ports:
      - "5432:5432"
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: time-archive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: time-archive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${TIME_ARCHIVE_MINIO_ROOT_USER:?Set TIME_ARCHIVE_MINIO_ROOT_USER in .env.local}
      MINIO_ROOT_PASSWORD: ${TIME_ARCHIVE_MINIO_ROOT_PASSWORD:?Set TIME_ARCHIVE_MINIO_ROOT_PASSWORD in .env.local}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: time-archive-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${TIME_ARCHIVE_MINIO_ROOT_USER:?Set TIME_ARCHIVE_MINIO_ROOT_USER in .env.local}
      MINIO_ROOT_PASSWORD: ${TIME_ARCHIVE_MINIO_ROOT_PASSWORD:?Set TIME_ARCHIVE_MINIO_ROOT_PASSWORD in .env.local}
      MINIO_BUCKET: time-archive-media
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"
        mc mb --ignore-existing \"local/$${MINIO_BUCKET}\"

volumes:
  postgres-18-data:
  minio-data:
