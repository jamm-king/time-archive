services:
  api:
    build:
      context: .
    container_name: time-archive-api
    environment:
      TIME_ARCHIVE_DATABASE_URL: jdbc:postgresql://postgres:5432/time_archive
      TIME_ARCHIVE_DATABASE_USERNAME: time_archive
      TIME_ARCHIVE_DATABASE_PASSWORD: time_archive
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: time-archive-postgres
    environment:
      POSTGRES_DB: time_archive
      POSTGRES_USER: time_archive
      POSTGRES_PASSWORD: time_archive
    ports:
      - "5432:5432"
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U time_archive -d time_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: time-archive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-18-data:
