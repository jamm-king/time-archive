services:
  postgres:
    image: postgres:18-alpine
    container_name: time-archive-postgres
    environment:
      POSTGRES_DB: time_archive
      POSTGRES_USER: time_archive
      POSTGRES_PASSWORD: time_archive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U time_archive -d time_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: time-archive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
