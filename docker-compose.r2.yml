services:
  api:
    environment:
      TIME_ARCHIVE_STORAGE_S3_ENDPOINT: ${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:?Set TIME_ARCHIVE_STORAGE_S3_ENDPOINT in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT: ${TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT:?Set TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL: ${TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL:?Set TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_BUCKET: ${TIME_ARCHIVE_STORAGE_S3_BUCKET:?Set TIME_ARCHIVE_STORAGE_S3_BUCKET in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_REGION: ${TIME_ARCHIVE_STORAGE_S3_REGION:-auto}
      TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY: ${TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY:?Set TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_SECRET_KEY: ${TIME_ARCHIVE_STORAGE_S3_SECRET_KEY:?Set TIME_ARCHIVE_STORAGE_S3_SECRET_KEY in .env.r2}
      TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS: ${TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS:-true}
