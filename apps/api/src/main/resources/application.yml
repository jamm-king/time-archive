spring:
  application:
    name: time-archive
  datasource:
    url: ${TIME_ARCHIVE_DATABASE_URL:jdbc:postgresql://localhost:5432/time_archive}
    username: ${TIME_ARCHIVE_DATABASE_USERNAME:time_archive}
    password: ${TIME_ARCHIVE_DATABASE_PASSWORD:time_archive}
  flyway:
    enabled: true
  data:
    redis:
      host: ${TIME_ARCHIVE_REDIS_HOST:localhost}
      port: ${TIME_ARCHIVE_REDIS_PORT:6379}
  session:
    redis:
      namespace: time-archive:sessions
    timeout: ${TIME_ARCHIVE_SESSION_TIMEOUT:30m}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

time-archive:
  payment:
    fake:
      enabled: ${TIME_ARCHIVE_PAYMENT_FAKE_ENABLED:false}
  rate-limit:
    enabled: ${TIME_ARCHIVE_RATE_LIMIT_ENABLED:true}
    client-ip-header: ${TIME_ARCHIVE_RATE_LIMIT_CLIENT_IP_HEADER:}
    key-salt: ${TIME_ARCHIVE_RATE_LIMIT_KEY_SALT:time-archive-local-rate-limit}
    registration:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_REGISTRATION_LIMIT:5}
      window: ${TIME_ARCHIVE_RATE_LIMIT_REGISTRATION_WINDOW:10m}
    login:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_LOGIN_LIMIT:10}
      window: ${TIME_ARCHIVE_RATE_LIMIT_LOGIN_WINDOW:1m}
    public-read:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_PUBLIC_READ_LIMIT:120}
      window: ${TIME_ARCHIVE_RATE_LIMIT_PUBLIC_READ_WINDOW:1m}
    purchase:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_PURCHASE_LIMIT:30}
      window: ${TIME_ARCHIVE_RATE_LIMIT_PURCHASE_WINDOW:1m}
    media-mutation:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_MEDIA_MUTATION_LIMIT:30}
      window: ${TIME_ARCHIVE_RATE_LIMIT_MEDIA_MUTATION_WINDOW:1m}
    admin:
      limit: ${TIME_ARCHIVE_RATE_LIMIT_ADMIN_LIMIT:60}
      window: ${TIME_ARCHIVE_RATE_LIMIT_ADMIN_WINDOW:1m}
  security:
    initial-admin-emails: ${TIME_ARCHIVE_INITIAL_ADMIN_EMAILS:}
  storage:
    s3:
      endpoint: ${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:http://localhost:9000}
      presigned-url-endpoint: ${TIME_ARCHIVE_STORAGE_S3_PRESIGNED_URL_ENDPOINT:${TIME_ARCHIVE_STORAGE_S3_ENDPOINT:http://localhost:9000}}
      public-base-url: ${TIME_ARCHIVE_STORAGE_S3_PUBLIC_BASE_URL:http://localhost:9000/time-archive-media}
      bucket: ${TIME_ARCHIVE_STORAGE_S3_BUCKET:time-archive-media}
      region: ${TIME_ARCHIVE_STORAGE_S3_REGION:us-east-1}
      access-key: ${TIME_ARCHIVE_STORAGE_S3_ACCESS_KEY:time_archive_minio}
      secret-key: ${TIME_ARCHIVE_STORAGE_S3_SECRET_KEY:time_archive_minio_secret}
      path-style-access: ${TIME_ARCHIVE_STORAGE_S3_PATH_STYLE_ACCESS:true}
      upload-url-expiration-seconds: ${TIME_ARCHIVE_STORAGE_S3_UPLOAD_URL_EXPIRATION_SECONDS:600}
      preview-url-expiration-seconds: ${TIME_ARCHIVE_STORAGE_S3_PREVIEW_URL_EXPIRATION_SECONDS:300}
      playback-url-expiration-seconds: ${TIME_ARCHIVE_STORAGE_S3_PLAYBACK_URL_EXPIRATION_SECONDS:600}
